# =============================================================================
# Bitbucket Pipelines - Stem.Device.Manager
# =============================================================================

image: mcr.microsoft.com/dotnet/sdk:8.0

# =============================================================================
# DEFINITIONS
# =============================================================================
definitions:
  caches:
    dotnetcore: ~/.nuget/packages

# =============================================================================
# PIPELINES
# =============================================================================
pipelines:
  # ---------------------------------------------------------------------------
  # DEFAULT - CI su tutti i branch
  # ---------------------------------------------------------------------------
  default:
    - step:
        name: Build
        caches:
          - dotnetcore
        script:
          - dotnet build STEMPM.csproj --configuration Release -p:EnableWindowsTargeting=true
