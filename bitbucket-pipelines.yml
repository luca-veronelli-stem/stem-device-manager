# =============================================================================
# Bitbucket Pipelines - Stem.Device.Manager
# =============================================================================

image: mcr.microsoft.com/dotnet/sdk:10.0

# =============================================================================
# DEFINITIONS
# =============================================================================
definitions:
  caches:
    dotnetcore: ~/.nuget/packages

# =============================================================================
# PIPELINES
# =============================================================================
pipelines:
  # ---------------------------------------------------------------------------
  # DEFAULT - CI su tutti i branch
  # ---------------------------------------------------------------------------
  default:
    - step:
        name: Build & Test
        caches:
          - dotnetcore
        script:
          # Build solution (SDK 10 supporta .slnx)
          - dotnet build Stem.Device.Manager.slnx --configuration Release -p:EnableWindowsTargeting=true
          # Test cross-platform (Core models/enums) — target net10.0 gira su Linux
          - dotnet test Tests/Tests.csproj--framework net10.0 --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
          # NOTA: i test WinForms (net10.0-windows) girano solo localmente su Windows (101 test)
        artifacts:
          - Tests/TestResults/**