# =============================================================================
# Bitbucket Pipelines - Stem.Device.Manager
# =============================================================================

image: mcr.microsoft.com/dotnet/sdk:8.0

# =============================================================================
# DEFINITIONS
# =============================================================================
definitions:
  caches:
    dotnetcore: ~/.nuget/packages

# =============================================================================
# PIPELINES
# =============================================================================
pipelines:
  # ---------------------------------------------------------------------------
  # DEFAULT - CI su tutti i branch
  # ---------------------------------------------------------------------------
  default:
    - step:
        name: Build & Test
        caches:
          - dotnetcore
        script:
          # Build App (.slnx non supportato da SDK 8, build esplicito per progetto)
          - dotnet build App/App.csproj --configuration Release -p:EnableWindowsTargeting=true
          # Build Tests (App già compilata, riusa via ProjectReference)
          - dotnet build Tests/Tests.csproj --configuration Release -p:EnableWindowsTargeting=true
          # Test (--no-build: usa gli assembly già compilati)
          - dotnet test Tests/Tests.csproj --no-build --configuration Release -p:EnableWindowsTargeting=true --logger "trx;LogFileName=results.trx" --results-directory ./test-reports
        artifacts:
          - test-reports/**