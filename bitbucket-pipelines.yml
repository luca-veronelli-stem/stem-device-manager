# =============================================================================
# Bitbucket Pipelines - Stem.Device.Manager
# =============================================================================

image: mcr.microsoft.com/dotnet/sdk:10.0

# =============================================================================
# DEFINITIONS
# =============================================================================
definitions:
  caches:
    dotnetcore: ~/.nuget/packages

# =============================================================================
# PIPELINES
# =============================================================================
pipelines:
  # ---------------------------------------------------------------------------
  # DEFAULT - CI su tutti i branch
  # ---------------------------------------------------------------------------
  default:
    - step:
        name: Build
        caches:
          - dotnetcore
        script:
          # Build solution (SDK 10 supporta .slnx)
          - dotnet build Stem.Device.Manager.slnx --configuration Release -p:EnableWindowsTargeting=true
          # NOTA: i test richiedono il runtime Microsoft.WindowsDesktop.App (WinForms)
          # che non è disponibile su Linux. L'esecuzione test avviene localmente su Windows.
          # TODO: estrarre Progetti cross-platform per esecuzione test in CI (vedi CI-001)