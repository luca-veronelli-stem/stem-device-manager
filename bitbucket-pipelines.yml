# =============================================================================
# Bitbucket Pipelines - Stem.Device.Manager
# =============================================================================

image: mcr.microsoft.com/dotnet/sdk:8.0

# =============================================================================
# DEFINITIONS
# =============================================================================
definitions:
  caches:
    dotnetcore: ~/.nuget/packages

# =============================================================================
# PIPELINES
# =============================================================================
pipelines:
  # ---------------------------------------------------------------------------
  # DEFAULT - CI su tutti i branch
  # ---------------------------------------------------------------------------
  default:
    - step:
        name: Build & Test
        caches:
          - dotnetcore
        script:
          # Build solution completa (App + Tests) per abilitare --no-build nel test
          - dotnet build Stem.Device.Manager.slnx --configuration Release -p:EnableWindowsTargeting=true
          # Test (--no-build: usa gli assembly già compilati)
          - dotnet test Tests/Tests.csproj --no-build --configuration Release -p:EnableWindowsTargeting=true --logger "trx;LogFileName=results.trx" --results-directory ./test-reports
        artifacts:
          - test-reports/**